<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rosarii-Início</title>
    <link rel="icon" href="img/favicon.svg" type="image/png">
    <link rel="stylesheet" href="css/style.css">
    <script src="js/buttons.js"></script>
</head>

<body>
    <header>
        <img src="img/logo.svg" alt="">

    <nav id="nav-pc">

    <main>
        <h2 id="coroa">Mistérios Gozosos</h2>
        <p id="misterios">Anúncio do Anjo</p>
        <h2></h2>
        <div class="imagens">
            <!-- Mistérios Gozozos -->
            <img src="img/mist-1.png" alt="1º Mistério Gozoso: A Anunciação do Anjo a Maria">
            <img src="img/mist-2.png" alt="2º Mistério Gozoso: A Visitação de Nossa Senhora a Santa Isabel">
            <img src="img/mist-3.png" alt="3º Mistério Gozoso: O Nascimento de Jesus em Belém">
            <img src="img/mist-4.png" alt="4º Mistério Gozoso: A Apresentação do Menino Jesus no Templo">
            <img src="img/mist-5.png" alt="5º Mistério Gozoso: A Perda e o Encontro do Menino Jesus no Templo">

            <!-- Mistérios Luminosos -->
            <img src="img/mist-6.png" alt="1º Mistério Luminoso: O Batismo de Jesus no Rio Jordão">
            <img src="img/mist-7.png" alt="2º Mistério Luminoso: A Auto-revelação de Jesus nas Bodas de Caná">

            <img src="img/mist-10.png" alt="5º Mistério Luminoso: A Instituição da Eucaristia">

            <!-- Mistérios Dolorosos -->
            <img src="img/mist-11.png" alt="1º Mistério Doloroso: A Agonia de Jesus no Horto das Oliveiras">
            <img src="img/mist-12.png" alt="2º Mistério Doloroso: A Flagelação de Jesus">
            <img src="img/mist-13.png" alt="3º Mistério Doloroso: A Coroação de Espinhos de Jesus">
            <img src="img/mist-14.png" alt="4º Mistério Doloroso: Jesus Carregando a Cruz a Caminho do Calvário">
            <img src="img/mist-15.png" alt="5º Mistério Doloroso: A Crucifixão e Morte de Jesus">

            <!-- Mistérios Gloriosos -->
            <img src="img/mist-16.png" alt="1º Mistério Glorioso: A Ressurreição de Jesus">
            <img src="img/mist-17.png" alt="2º Mistério Glorioso: A Ascensão de Jesus ao Céu">
            <img src="img/mist-18.png" alt="3º Mistério Glorioso: A Vinda do Espírito Santo sobre os Apóstolos">
            <img src="img/mist-19.png" alt="4º Mistério Glorioso: A Assunção de Nossa Senhora ao Céu">
            <img src="img/mist-20.png" alt="5º Mistério Glorioso: A Coroação de Nossa Senhora no Céu">
